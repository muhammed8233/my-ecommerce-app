spring.mongodb.uri=${SPRING_MONGODB_URI}
spring.data.mongodb.database=ecommerce_db
# Keep this for UUID support
spring.data.mongodb.uuid-representation=standard

spring.main.allow-circular-references=true
spring.data.mongodb.auto-index-creation=true
server.port=${PORT:8080}

application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY}

paystack.secret.key=${PAYSTACK_SECRET_KEY}
paystack.base.url=${PAYSTACK_BASE_URL}

spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.port=587
spring.mail.host=smtp.gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.servlet.multipart.enabled=true
